# git-cliff configuration for a Conventional Commits changelog.

[changelog]
header = """
# Changelog

All notable changes to this project are documented in this file.
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}

{% for commit in commits %}\
- {% if commit.breaking %}**Breaking:** {% endif %}{% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }} ([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/Genki1231/blendarium/commit/{{ commit.id }}))
{% endfor %}
{% endfor %}\
"""
footer = """
<!-- This file is generated by git-cliff. -->
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
protect_breaking_commits = true
filter_commits = false
# Accept common semantic-version tags with or without a leading "v".
tag_pattern = "v?[0-9].*"
topo_order = false
sort_commits = "oldest"

# Numeric HTML comments preserve a predictable section order while remaining
# invisible in the rendered Markdown headings.
commit_parsers = [
  { message = '^feat', group = '<!-- 00 -->Features' },
  { message = '^fix', group = '<!-- 01 -->Bug Fixes' },
  { message = '^docs', group = '<!-- 02 -->Documentation' },
  { message = '^perf', group = '<!-- 03 -->Performance' },
  { message = '^refactor', group = '<!-- 04 -->Refactoring' },
  { message = '^test', group = '<!-- 05 -->Testing' },
  { message = '^build', group = '<!-- 06 -->Build System' },
  { message = '^ci', group = '<!-- 07 -->Continuous Integration' },
  { message = '^chore', group = '<!-- 08 -->Chores' },
  { message = '^style', group = '<!-- 09 -->Styling' },
  { message = '^revert', group = '<!-- 10 -->Reverts' },
  { message = '.*', group = '<!-- 99 -->Other Changes' },
]
