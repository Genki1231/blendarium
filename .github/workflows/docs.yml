name: docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# GitHub Pages permits one deployment at a time. An active deployment is not
# cancelled because interrupting it can leave the published site inconsistent.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install documentation dependencies
        run: pip install -r requirements-docs.txt

      # The default checkout directory is named blendarium. This preserves the
      # package-parent relationship required by paths: [".."] in mkdocs.yml.
      - name: Build the documentation
        run: mkdocs build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload the generated site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
